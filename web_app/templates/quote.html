{% extends './partials/base.html'%}

{% block style %}
<style>
    #request-service{
        border: 1px solid gray;
        border-radius: 1vw;
        width: 90vw;
        margin: auto;
        min-height: 10vh;
    }
    #form-title{
        margin-left: 3vw;

    }
    #form-title{
        margin-top: 3vh;
        margin-bottom: 3vh;
    }
    .form-item{
        margin-left: 3vw;
        width: auto;
    }
    label{
        margin-top: 2vh;
        font-size: 1vw;
        margin-bottom: 0.5vh;
    }
    input, select{
        border-radius: 0.7vh;
        background-color: lightgray;
        width: 40vw;
        height: 5vh;
    }
    .form-row {
        display: flex;
        gap: 1vw; /* Space between the columns */
        margin-bottom: 15px;
    }
    select{
        width: 80vw;
    }
    button{
        margin-top: 2vh;
    }
    .btn-slide {
    background-image: linear-gradient(to left, white 50%, #0d6efd 50%);
    background-size: 200% 100%;
    background-position: right bottom;
    transition: background-position 0.4s ease-out, color 0.4s ease-out;
    border: none;
    }

    button:hover{
        background-position: left bottom;
    }
</style>
{% endblock %}


{% block content %}
<section id="request-service">
    <h2 id="form-title">Request Service or Quote</h2>
    <form action="{% url 'quote' %}" method="post">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-item">
                <label for="full-name">Full Name *</label><br>
                <input type="text" placeholder="John Doe"  name="full-name" required>
            </div>
            <div class="form-item">
                <label for="email">Email Address *</label>
                <input type="email" placeholder="john@email.com" name="email" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-item">
                <label for="phone">Phone Number *</label>
                <input type="phone" placeholder="(555) 123-4567" name="phone" required>
            </div>
            <div class="form-item">
                <label for="company">Company/Building Name</label>
                <input type="text" placeholder="ABC Corporation" name="company" >
            </div>
        </div>
        <div class="form-row">
            <div class="form-item">
                <label for="service-type">Service Type *</label><br>
                <select name="service" id="service-type" required>
                    <option value="" selected disabled>-- Please choose an option --</option>
                    <option value="Service 1">Service 1</option>
                    <option value="Service 2">Service 2</option>
                    <option value="Service 3">Service 3</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-item">
                <label for="message" required >Message *</label><br>
                <textarea name="message" id="message" cols="215" rows="5" placeholder="Please describe your needs or questions..."></textarea>
            </div>
        </div>
        
        <div class="d-flex flex-column align-items-center gap-3">
            <button type="submit" class="p-3 bg-light border btn btn-slide"><i class="fa-regular fa-paper-plane"></i> Submit request</button><br>
            <p class="p-1">* Required fields. We'll respond to your request within 24 hours.</p>
        </div>
        
    </form>
</section>

{% endblock %}

{% block scripts %}
{% endblock %}
